{% extends 'base.html' %}
{% block content %}
<div class="auth-card card p-4">
    <h2 class="h4 mb-3">Create Account</h2>
    <form method="post" novalidate>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="full_name" placeholder="Enter your full name" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="Enter email address" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Create a password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
</div>
{% endblock %}
