{% extends 'base.html' %}
{% block content %}
<div class="card p-4 auth-card">
    <h2 class="h4 mb-3">Book {{ destination.name }}</h2>
    <form method="post" novalidate>
        <div class="mb-3">
            <label class="form-label">Travel Date</label>
            <input type="date" class="form-control" name="travel_date" aria-label="Travel date" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Guests</label>
            <input type="number" class="form-control" name="guests" min="1" value="1" aria-label="Number of guests" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="3" placeholder="Add any special requests" aria-label="Booking notes"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Confirm Booking</button>
    </form>
</div>
{% endblock %}
