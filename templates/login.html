{% extends 'base.html' %}
{% block content %}
<div class="auth-card card p-4">
    <h2 class="h4 mb-3">{{ 'Admin Login' if admin_mode else 'User Login' }}</h2>
    <form method="post" novalidate>
        {% if admin_mode %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter admin username" required>
        </div>
        {% else %}
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="Enter email address" required>
        </div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    {% if not admin_mode %}
    <p class="mt-3 mb-0 text-center">New user? <a href="{{ url_for('auth.register') }}">Register here</a></p>
    {% endif %}
</div>
{% endblock %}
