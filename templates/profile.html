{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
    <h2 class="h4 mb-3">My Profile</h2>
    <div class="row g-3">
        <div class="col-md-6"><strong>Name:</strong> {{ user.full_name }}</div>
        <div class="col-md-6"><strong>Email:</strong> {{ user.email }}</div>
        <div class="col-md-6"><strong>Member Since:</strong> {{ user.created_at }}</div>
        <div class="col-md-6"><strong>Total Bookings:</strong> {{ booking_count }}</div>
    </div>
</div>
{% endblock %}
